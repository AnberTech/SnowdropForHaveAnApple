<!doctype html>
<html lang="tr" class="h-full">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>Kardelen</title>
<script src="https://cdn.tailwindcss.com/3.4.17"></script>

<style>
html, body { height:100%; margin:0; }

body {
  box-sizing:border-box;
  overflow:hidden;
  background:#f7f5f0;
}

.page-bg {
  background:#f7f5f0;
  min-height:100%;
  width:100%;
  position:relative;
}

@keyframes snowfall {
  0% { transform:translateY(-10px); opacity:0; }
  10% { opacity:0.4; }
  90% { opacity:0.3; }
  100% { transform:translateY(100vh); opacity:0; }
}

.snowflake {
  position:fixed;
  width:4px;
  height:4px;
  background:rgba(255,255,255,0.7);
  border-radius:50%;
  z-index:0;
  animation:snowfall linear infinite;
}

.snowdrop-garden {
  position:fixed;
  left:-5%;
  width:110%;
  bottom:0;
  height:340px;
  pointer-events:none;
  z-index:2;
  transform:scale(1.28);
  transform-origin:bottom center;
}

.ground-haze {
  position:absolute;
  bottom:0;
  height:120px;
  width:100%;
}

.snowdrop {
  position:absolute;
  bottom:-4px;
  transform-origin:bottom center;
}

/* 🌸 ORTA ZAMBAK (AYRI WRAPPER!) */
.center-wrapper {
  position:absolute;
  left:50%;
  bottom:-6px;
  transform:translateX(-50%);
  z-index:6;
}

.center-lily {
  width:260px;
}

/* animasyonlar sadece iç elemana uygulanır */
.sway-a { animation:swayA 7s ease-in-out infinite; }

@keyframes swayA {
  0% { transform:rotate(-2deg); }
  50% { transform:rotate(2deg); }
  100% { transform:rotate(-2deg); }
}

.music-toggle {
  position:fixed;
  top:50%;
  left:50%;
  transform:translate(-50%,-50%);
  z-index:20;
}
</style>
</head>

<body>
<div class="page-bg">

<div id="snow-container"></div>

<button id="musicToggle" class="music-toggle">
<span id="musicIcon">▶</span>
</button>

<audio id="bgMusic" loop>
<source src="yalnizlik.mp3" type="audio/mpeg">
</audio>

<div class="snowdrop-garden">

<div class="ground-haze"></div>

<!-- 🌸 ORTA ZAMBAK -->
<div class="center-wrapper">
  <img src="./Lily.svg" class="center-lily sway-a">
</div>

<!-- TÜM ORİJİNAL ÇİÇEKLERİN AYNI KALDI -->
<img src="snowdropnew1.svg" class="snowdrop" style="left:10%; width:90px;">
<img src="snowdropnew2.svg" class="snowdrop" style="left:30%; width:110px;">
<img src="snowdropnew1.svg" class="snowdrop" style="left:60%; width:100px;">
<img src="snowdropnew2.svg" class="snowdrop" style="left:80%; width:120px;">

</div>
</div>

<script>
const snowContainer = document.getElementById("snow-container");

for (let i=0;i<12;i++){
 let s=document.createElement("div");
 s.className="snowflake";
 s.style.left=Math.random()*100+"%";
 s.style.animationDuration=(15+Math.random()*20)+"s";
 snowContainer.appendChild(s);
}

const musicToggle=document.getElementById("musicToggle");
const bgMusic=document.getElementById("bgMusic");
const musicIcon=document.getElementById("musicIcon");

musicToggle.onclick=()=>{
 if(bgMusic.paused){
   bgMusic.play();
   musicIcon.textContent="❚❚";
 }else{
   bgMusic.pause();
   musicIcon.textContent="▶";
 }
};
</script>

</body>
</html>
